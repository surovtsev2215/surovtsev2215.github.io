databases:
  - name: pto-db
    plan: free
    databaseName: pto
    user: pto

services:
  - type: web
    name: pto-backend
    runtime: node
    plan: free
    rootDir: web/backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "https://surovtsev2215.github.io"
      - key: DATABASE_URL
        fromDatabase:
          name: pto-db
          property: connectionString
